name: Build & deploy okf.impermanente.es

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Cada hora: detecta posts nuevos y rebuild + deploy.
    - cron: '17 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-okf-impermanente
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build OKF bundle
        run: python3 scripts/build_site.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          cname: okf.impermanente.es
          force_orphan: true
